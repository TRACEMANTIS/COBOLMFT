services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cobolmf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cobolmf}
      POSTGRES_DB: ${POSTGRES_DB:-cobolmf}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cobolmf}"]
      interval: 5s
      timeout: 3s
      retries: 10

  runner:
    build:
      context: ./services/runner
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      COBOL_IMAGE: cobol-mf/cobol-runtime:latest
      PORT: 8080
    ports:
      - "8080:8080"
    # The runner shells out to `docker run`. In dev we mount the host
    # docker socket. NOT a production pattern.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    profiles: ["dev", "prod"]

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      runner:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cobolmf}:${POSTGRES_PASSWORD:-cobolmf}@postgres:5432/${POSTGRES_DB:-cobolmf}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD}
      RUNNER_URL: http://runner:8080
    ports:
      - "3000:3000"
    profiles: ["prod"]

volumes:
  postgres-data:
